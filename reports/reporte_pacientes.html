<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Pacientes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f6f8;
        }
        h1 {
            color: #1f4e79;
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #1f4e79;
            color: white;
        }
        .activo {
            background-color: #d4edda;
            color: #155724;
            font-weight: bold;
        }
        .sin-diagn {
            background-color: #fff3cd;
            color: #856404;
            font-weight: bold;
        }
        .critico {
            background-color: #f8d7da;
            color: #721c24;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Historial de Pacientes</h1>
    <table>
        <tr>
            <th>Paciente</th>
            <th>Edad</th>
            <th>Tipo de Sangre</th>
            <th>Diagnostico Activo</th>
            <th>Medicamento / Dosis</th>
            <th>Estado</th>
        </tr>
        <tr>
            <td>Maria Garcia</td>
            <td>45</td>
            <td>A+</td>
            <td>Hipertension</td>
            <td>Losartan 50mg / DIARIA</td>
            <td class="activo">ACTIVO</td>
        </tr>
    </table>
</body>
</html>
